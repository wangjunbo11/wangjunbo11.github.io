<div class="pub-card {% for t in post.tags %}{{ t }} {% endfor %}">

  <div class="pub-title">
    <a href="{{ post.url }}">{{ post.title }}</a>
  </div>

  <div class="pub-authors">
    {{ post.authors }}
  </div>

  <div class="pub-venue">
    {{ post.venue }}
  </div>

  <div class="pub-excerpt">
    {{ post.excerpt }}
  </div>

  <div class="pub-tags">
    {% for t in post.tags %}
      <span>{{ t }}</span>
    {% endfor %}
  </div>

  <div class="pub-links">
    {% if post.paperurl %}
      <a href="{{ post.paperurl }}" target="_blank">DOI</a>
    {% endif %}
    <a href="{{ post.url }}">Details</a>
  </div>

</div>
