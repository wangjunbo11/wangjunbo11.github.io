---
layout: archive
title: "Publications"
permalink: /publications/
author_profile: true
---

{% include base_path %}

<div class="publications-grid">

{% for post in site.publications reversed %}

  <div class="pub-card">

    <div class="pub-title">
      <a href="{{ post.url }}">{{ post.title }}</a>
    </div>

    <div class="pub-authors">
      {{ post.authors }}
    </div>

    <div class="pub-venue">
      {{ post.venue }}
    </div>

    <div class="pub-excerpt">
      {{ post.excerpt }}
    </div>

    <div class="pub-links">
      {% if post.paperurl %}
        <a href="{{ post.paperurl }}" target="_blank">DOI</a>
      {% endif %}
      <a href="{{ post.url }}">Details</a>
    </div>

  </div>

{% endfor %}

</div>

<style>
.publications-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

.pub-card {
  border: 1px solid #e5e5e5;
  border-radius: 12px;
  padding: 16px;
  background: #fff;
  transition: 0.2s ease;
}

.pub-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

.pub-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 8px;
}

.pub-authors {
  font-size: 13px;
  color: #666;
  margin-bottom: 6px;
}

.pub-venue {
  font-size: 13px;
  font-style: italic;
  color: #888;
  margin-bottom: 10px;
}

.pub-excerpt {
  font-size: 13px;
  color: #444;
  margin-bottom: 10px;
}

.pub-links a {
  font-size: 12px;
  margin-right: 10px;
  color: #2a6fdb;
  text-decoration: none;
}

.pub-links a:hover {
  text-decoration: underline;
}
</style>
